apiVersion: apps/v1
kind: Deployment
metadata:
  name: pneumonia-api-deployment
  labels:
    app: pneumonia-api
spec:
  replicas: 2 # Runs two copies of your app simultaneously for high-availability backup
  selector:
    matchLabels:
      app: pneumonia-api
  template:
    metadata:
      labels:
        app: pneumonia-api
    spec:
      containers:
      - name: api-container
        image: peumonia-api:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: pneumonia-api-service
spec:
  type: NodePort
  selector:
    app: pneumonia-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080 # Exposes your app across a Kubernetes cluster network layer
